version: "3.9"

services:
  biodiversity-change-detection-build:
    image: node:22
    container_name: biodiversity-change-detection-build
    working_dir: /app
    volumes:
      - ../:/app
    command: >
      sh -c "npm ci && npm run build"

  biodiversity-change-detection-nginx:
    image: nginx:1.27-alpine
    container_name: biodiversity-change-detection-nginx
    depends_on:
      biodiversity-change-detection-build:
        condition: service_completed_successfully
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.biodiversity-change-detection.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.biodiversity-change-detection.entrypoints=websecure"
      - "traefik.http.routers.biodiversity-change-detection.tls.certresolver=sslresolver"
      - "traefik.http.routers.biodiversity-change-detection.tls.domains[0].main=${TRAEFIK_HOST}"
      - "traefik.http.services.biodiversity-change-detection.loadbalancer.server.port=80"
    networks:
      - traefik

networks:
  traefik:
    external: true
